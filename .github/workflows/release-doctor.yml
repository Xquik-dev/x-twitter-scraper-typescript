name: Release Doctor

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/scripts/verify-release-context.sh"
      - ".github/workflows/publish-npm.yml"
      - ".github/workflows/release-doctor.yml"
      - "bin/check-release-environment"
      - "bin/publish-npm"
      - "package.json"
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release-doctor:
    name: Validate Release
    if: github.repository == 'Xquik-dev/x-twitter-scraper-typescript'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Check release environment
        run: bash ./bin/check-release-environment
