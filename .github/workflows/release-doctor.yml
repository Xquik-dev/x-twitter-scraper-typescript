name: Release Doctor

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/scripts/verify-release-context.sh"
      - ".github/workflows/publish-npm.yml"
      - ".github/workflows/release-doctor.yml"
      - "bin/check-release-environment"
      - "bin/publish-npm"
      - "package.json"
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release-doctor:
    name: Validate Release
    if: github.repository == 'Xquik-dev/x-twitter-scraper-typescript'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Check release environment
        run: bash ./bin/check-release-environment
